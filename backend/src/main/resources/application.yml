server:
  port: 8080

# 日志级别配置：抑制不必要的 INFO/WARN 日志
logging:
  level:
    # RepositoryConfigurationExtensionSupport 在启动时扫描所有 JPA 仓库判定 Redis 归属，产生大量冗余 INFO 日志
    org.springframework.data.repository.config.RepositoryConfigurationExtensionSupport: WARN
    # ResourceHandlerUtils 的尾部斜杠追加提示为内部行为，降级为 ERROR 不显示
    org.springframework.web.servlet.resource.ResourceHandlerUtils: ERROR

spring:
  autoconfigure:
    exclude:
  application:
    name: campus-trade-platform
  datasource:
    url: ${DB_URL:jdbc:mariadb://127.0.0.1:3306/enterprise_website?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
      continue-on-error: true
  data:
    redis:
      host: localhost
      port: 6379
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

app:
  upload-dir: ${UPLOAD_DIR:uploads}
  public-url-prefix: ${PUBLIC_UPLOAD_PREFIX:/uploads/}
  initial-admin-password: ${ADMIN_INITIAL_PASSWORD:123456}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  auth:
    token-ttl-minutes: ${TOKEN_TTL_MINUTES:480}
    captcha-ttl-minutes: ${CAPTCHA_TTL_MINUTES:5}
  merchant-level-scheduler:
    enabled: ${MERCHANT_LEVEL_SCHEDULER_ENABLED:true}
    # cron 表达式，默认每天凌晨3点执行
    cron: ${MERCHANT_LEVEL_SCHEDULER_CRON:0 0 3 * * ?}
